<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MisFinanzas">
<title>Mis Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A0F;--surface:#13131A;--surface2:#1C1C26;--border:rgba(255,255,255,0.07);--text:#F0EFE8;--muted:#6B6A7A;--accent:#7B6EF6;--accent2:#4ECDC4;--danger:#FF6B6B;--warn:#FFB347;--green:#56CF7F;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;max-width:430px;margin:0 auto;position:relative;}
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.status-time{font-family:var(--mono);font-size:15px;font-weight:500;}
.status-icons{display:flex;gap:6px;align-items:center;}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:90px;}
.scroll-area::-webkit-scrollbar{display:none;}
.header{padding:8px 24px 20px;}
.greeting{font-size:13px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.header-title{font-size:28px;font-weight:800;letter-spacing:-0.02em;}
.header-sub{font-size:13px;color:var(--muted);margin-top:2px;font-family:var(--mono);}
.hero{margin:0 16px 16px;border-radius:24px;background:var(--surface);border:1px solid var(--border);padding:24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(123,110,246,0.18) 0%,transparent 70%);pointer-events:none;}
.hero-label{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.hero-amount{font-size:40px;font-weight:800;letter-spacing:-0.03em;line-height:1;margin-bottom:6px;}
.hero-amount span{color:var(--accent);}
.hero-sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:20px;}
.hero-row{display:flex;gap:12px;}
.hero-pill{flex:1;background:var(--surface2);border-radius:14px;padding:12px 14px;}
.hero-pill-label{font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.hero-pill-val{font-size:15px;font-weight:700;}
.ring-wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0 0;border-top:1px solid var(--border);margin-top:16px;}
.ring-info-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;}
.ring-info-val{font-size:18px;font-weight:700;color:var(--accent2);}
.ring-info-sub{font-size:11px;color:var(--muted);font-family:var(--mono);}
.ring-svg{width:64px;height:64px;}
.section{padding:0 16px 4px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 8px;}
.section-title{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px;}
.stat-card-label{font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.stat-card-val{font-size:20px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px;}
.stat-card-sub{font-size:11px;color:var(--muted);font-family:var(--mono);}
.stat-card.accent{background:linear-gradient(135deg,#1A1830 0%,#1C1C2E 100%);border-color:rgba(123,110,246,0.25);}
.stat-card.accent .stat-card-val{color:var(--accent);}
.mini-chart{margin:0 16px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px;}
.mini-chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mini-chart-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.mini-chart-val{font-size:14px;font-weight:700;color:var(--accent2);font-family:var(--mono);}
.bars{display:flex;gap:6px;align-items:flex-end;height:70px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-rect{width:100%;border-radius:5px 5px 0 0;}
.bar-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);}
.tip-card{margin:0 16px 16px;background:linear-gradient(135deg,#1A1830,#111122);border:1px solid rgba(123,110,246,0.3);border-radius:20px;padding:18px;display:flex;gap:14px;align-items:flex-start;}
.tip-icon{width:36px;height:36px;border-radius:10px;background:rgba(123,110,246,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tip-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.tip-text{font-size:12px;color:var(--muted);line-height:1.5;}
.debt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.debt-item{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:16px 18px;}
.debt-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.debt-name{font-size:15px;font-weight:700;}
.debt-amount{font-size:18px;font-weight:800;font-family:var(--mono);}
.debt-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.debt-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:0.05em;}
.debt-eta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.debt-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.debt-bar-fill{height:100%;border-radius:3px;}
.plan-tabs{display:flex;gap:8px;margin-bottom:14px;padding:0 8px;}
.plan-tab{flex:1;padding:8px 4px;text-align:center;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:0.03em;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all 0.2s;}
.plan-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:16px;}
.plan-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.plan-header-title{font-size:14px;font-weight:700;}
.plan-header-income{font-size:13px;color:var(--accent2);font-family:var(--mono);font-weight:500;}
.plan-row{display:flex;justify-content:space-between;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border);}
.plan-row:last-child{border-bottom:none;}
.plan-row-left{font-size:13px;}
.plan-row-left small{display:block;font-size:10px;color:var(--muted);margin-top:1px;font-family:var(--mono);}
.plan-row-right{font-size:14px;font-weight:700;font-family:var(--mono);}
.neg{color:var(--danger);}
.pos{color:var(--green);}
.dbt{color:var(--warn);}
.plan-total{padding:14px 18px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;}
.plan-total-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.plan-total-val{font-size:20px;font-weight:800;font-family:var(--mono);}
.plan-empty{padding:24px 18px;text-align:center;font-size:13px;color:var(--muted);}
.edit-section{margin:0 16px 20px;}
.edit-block{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:8px;}
.edit-block-header{padding:12px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.edit-block-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.edit-block-total{font-size:14px;font-weight:700;font-family:var(--mono);}
.edit-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
.edit-row:last-child{border-bottom:none;}
.edit-row-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.edit-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:500;width:88px;padding:6px 8px;text-align:right;outline:none;-webkit-appearance:none;}
.edit-input:focus{border-color:var(--accent);}
.q-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.q-btn{padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font);transition:all 0.15s;letter-spacing:0.04em;}
.q-btn.q1-active{background:#7B6EF6;color:#fff;}
.q-btn.q2-active{background:#4ECDC4;color:#0A0A0F;}
.q-btn.both-active{background:linear-gradient(90deg,#7B6EF6,#4ECDC4);color:#fff;}
.edit-delete{width:28px;height:28px;border-radius:8px;background:rgba(255,107,107,0.1);border:none;color:var(--danger);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.add-row-btn{width:100%;padding:12px;background:transparent;border:1px dashed rgba(123,110,246,0.3);border-radius:14px;color:var(--accent);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}
.q-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0;}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px 48px;width:100%;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:var(--font);font-size:16px;padding:14px 16px;outline:none;}
.modal-input:focus{border-color:var(--accent);}
.q-select-row{display:flex;gap:10px;margin-top:4px;}
.q-select-btn{flex:1;padding:12px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;}
.q-select-btn.sel-q1{background:rgba(123,110,246,0.2);border-color:#7B6EF6;color:#7B6EF6;}
.q-select-btn.sel-q2{background:rgba(78,205,196,0.2);border-color:#4ECDC4;color:#4ECDC4;}
.q-select-btn.sel-both{background:rgba(123,110,246,0.15);border-color:#7B6EF6;color:#7B6EF6;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;}
.btn-save{flex:2;padding:14px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:rgba(19,19,26,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 0 28px;display:flex;justify-content:space-around;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 16px;opacity:0.4;transition:opacity 0.2s;}
.nav-item.active{opacity:1;}
.nav-icon{width:24px;height:24px;}
.nav-label{font-size:10px;letter-spacing:0.05em;font-weight:600;}
.nav-item.active .nav-label{color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.hero{animation:fadeUp 0.4s ease both;}
.legend{display:flex;gap:14px;padding:0 24px 12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
</style>
</head>

      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0" y="4" width="3" height="8" rx="1" fill="#F0EFE8"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1" fill="#F0EFE8"/><rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#F0EFE8"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="rgba(240,239,232,0.3)"/></svg>

      </div>

          <svg class="ring-svg" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="6"/>

            <text id="ring-pct" x="32" y="36" text-anchor="middle" fill="#F0EFE8" font-size="11" font-family="'DM Mono'" font-weight="500">0%</text>

        </div>
