<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" rx="230" fill="#0B0F14"/>
  <defs>
    <linearGradient id="g1" x1="220" y1="180" x2="804" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22F0B8"/>
      <stop offset="100%" stop-color="#0C9B6E"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Glow background blob -->
  <ellipse cx="512" cy="512" rx="280" ry="300" fill="#16C79A" opacity="0.06"/>
  <!-- N: left vertical, diagonal, right vertical as thick strokes with round caps -->
  <g filter="url(#glow)">
    <!-- Left vertical bar -->
    <line x1="220" y1="180" x2="220" y2="844" stroke="url(#g1)" stroke-width="100" stroke-linecap="round"/>
    <!-- Diagonal from top-left to bottom-right -->
    <line x1="220" y1="180" x2="804" y2="844" stroke="url(#g1)" stroke-width="100" stroke-linecap="round"/>
    <!-- Right vertical bar -->
    <line x1="804" y1="180" x2="804" y2="844" stroke="url(#g1)" stroke-width="100" stroke-linecap="round"/>
  </g>
</svg>
